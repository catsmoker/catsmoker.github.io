<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        h1 {
            font-size: 8em;
            margin: 0;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 3s ease-in-out infinite;
        }
        p {
            font-size: 1.5em;
            margin: 20px 0;
        }
        a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #00d2ff;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        a:hover {
            background-color: #00d2ff;
            color: #1a1a1a;
            transform: scale(1.1);
        }
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <p>It seems like you've stumbled upon a broken link or a page that has been moved.</p>
    <p>Don't worry, you can <a href="/index.html">go back to the homepage</a> or try searching for what you're looking for.</p>
</body>
</html>
