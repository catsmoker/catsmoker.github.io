<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Page with Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        .download-link {
            display: block;
            margin: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .download-link:hover {
            background-color: #45a049;
        }
        .search-box {
            margin: 20px;
            padding: 10px;
            font-size: 16px;
            width: 80%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <h1>Download Files</h1>
    <p>Type to search for files:</p>
    <input type="text" id="searchBox" class="search-box" placeholder="Search for files...">

    <div id="linksContainer">
        <a href="https://github.com/catsmoker/webviewapp/releases/download/v1.0/catsmoker.apk" class="download-link" download>catsmoker app</a>
        <a href="https://github.com/catsmoker/cs_script.bat/releases/download/v1.0/cs_script.bat" class="download-link" download>cs_script.bat</a>
        <a href="comingsoon.html" class="download-link" download>comingsoon</a>
        <!-- Add more download links as needed -->
    </div>

    <script>
        document.getElementById('searchBox').addEventListener('input', function() {
            var searchTerm = this.value.toLowerCase();
            var links = document.querySelectorAll('#linksContainer .download-link');
            
            links.forEach(function(link) {
                var text = link.textContent.toLowerCase();
                if (text.includes(searchTerm)) {
                    link.style.display = 'block';
                } else {
                    link.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
