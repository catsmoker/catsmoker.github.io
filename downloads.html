<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Page with Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            padding: 20px;
        }
        .download-link {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .download-link:hover {
            background-color: #45a049;
        }
        .search-box {
            margin: 20px;
            padding: 10px;
            font-size: 16px;
            width: 80%;
            max-width: 500px;
        }
        .section {
            padding: 20px;
            text-align: center;
        }
        .home-link {
            text-decoration: none;
            color: white;
            font-size: 18px;
            padding: 10px 20px;
            background-color: #007BFF;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
            display: inline-block;
        }
        .home-link:hover {
            background-color: #0056b3;
            transform: scale(1.1);
        }
        .icon {
            margin-left: 10px;
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <section id="buttons" class="section">
        <a href="index.html" class="home-link">GO HOME</a>
    </section>

    <h1>Download Files</h1>
    <p>Type to search for files:</p>
    <input type="text" id="searchBox" class="search-box" placeholder="Search for files...">

    <div id="linksContainer">
        <a href="https://github.com/catsmoker/webviewapp/releases/download/v1.0/catsmoker.apk" class="download-link" download>
            catsmoker app
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
        </a>
        <a href="https://github.com/catsmoker/cs_script/releases/download/script/cs_script.cmd" class="download-link" download>
            cs_script
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
        </a>
        <a href="https://github.com/catsmoker/PUBG-120FPS/releases/download/V0.0.5/v0.0.5.zip" class="download-link" download>
            120FPS PUBG MAGISK MODULE
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
        </a>
        <a href="comingsoon.html" class="download-link" download>
            comingsoon
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
        </a>
        <!-- Add more download links as needed -->
    </div>

    <script>
        document.getElementById('searchBox').addEventListener('input', function() {
            var searchTerm = this.value.toLowerCase();
            var links = document.querySelectorAll('#linksContainer .download-link');
            
            links.forEach(function(link) {
                var text = link.textContent.toLowerCase();
                if (text.includes(searchTerm)) {
                    link.style.display = 'flex';
                } else {
                    link.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
