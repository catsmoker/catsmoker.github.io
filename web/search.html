<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google V2</title>
  <link rel="search" type="application/opensearchdescription+xml" href="https://catsmoker.github.io/web/search.xml" title="Search">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Georama:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    
    body {
      font-family: "Georama", sans-serif;
      font-optical-sizing: auto;
      font-weight: <weight>;
      font-style: normal;
      font-variation-settings: "wdth" 100;
      text-align: center;
      margin-top: 100px;
      background: #f8f9fa;
    }
    .logo {
      font-size: 72px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .blue { color: #4285F4; }
    .red { color: #EA4335; }
    .yellow { color: #FBBC05; }
    .green { color: #34A853; }
    .subtext {
      color: #5f6368;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .search-box {
      width: 580px;
      height: 44px;
      border-radius: 24px;
      border: 1px solid #dfe1e5;
      padding: 0 20px;
      font-size: 16px;
      outline: none;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .search-box:hover, .search-box:focus {
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .buttons {
      margin-top: 20px;
    }
    .search-btn, .lucky-btn {
      background-color: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      padding: 10px 16px;
      margin: 0 4px;
      font-size: 14px;
      cursor: pointer;
    }
    .search-btn:hover, .lucky-btn:hover {
      border: 1px solid #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }
    .settings-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      color: #5f6368;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
  <div class="logo">
    <span class="blue">G</span>
    <span class="red">o</span>
    <span class="yellow">o</span>
    <span class="blue">g</span>
    <span class="green">l</span>
    <span class="red">e</span>
  </div>
  <div class="subtext">V2 By catsmoker</div>
  <input type="text" class="search-box" id="search" placeholder="Search Google or use !bang (e.g., !yt cats)" autofocus>
  <div class="buttons">
    <button class="search-btn" onclick="search()">Google Search</button>
    <button class="lucky-btn" onclick="imFeelingLucky()">I'm Feeling Lucky</button>
  </div>

  <!-- Hidden Settings Panel -->
  <div id="settings-panel" style="display: none; margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 8px; max-width: 500px; margin-left: auto; margin-right: auto;">
    <h3>🔧 Settings</h3>
    <div>
      <label><input type="checkbox" id="dark-mode"> Dark Mode</label>
    </div>
    <div style="margin-top: 15px;">
      <h4>Custom !bangs</h4>
      <input type="text" id="custom-bang" placeholder="!mybang" style="padding: 8px;">
      <input type="text" id="custom-url" placeholder="https://example.com/?q=%s" style="padding: 8px; width: 300px;">
      <button onclick="saveCustomBang()" style="padding: 8px 12px;">Add</button>
    </div>
    <div style="margin-top: 15px;">
      <h4>Privacy</h4>
      <label><input type="checkbox" id="strip-trackers"> Remove tracking parameters (utm_, fbclid, etc.)</label>
    </div>
  </div>

  <script>
    // !bang database (Rebang + custom)
    let bangs = {
      "!g": "https://www.google.com/search?q=%s",
      "!yt": "https://www.youtube.com/results?search_query=%s",
      "!w": "https://en.wikipedia.org/wiki/Special:Search/%s",
      "!gh": "https://github.com/search?q=%s",
      "!d": "https://duckduckgo.com/?q=%s"
    };

    // Load saved settings
    function loadSettings() {
      if (localStorage.getItem('dark-mode') === 'true') {
        document.body.style.backgroundColor = '#202124';
        document.body.style.color = '#e8eaed';
      }
      if (localStorage.getItem('strip-trackers') === 'true') {
        document.getElementById('strip-trackers').checked = true;
      }
      // Load custom !bangs
      Object.entries(localStorage).forEach(([key, val]) => {
        if (key.startsWith('bang:')) bangs[key.slice(5)] = val;
      });
    }

    // Toggle settings panel
    function toggleSettings() {
      const panel = document.getElementById('settings-panel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    // Save custom !bang
    function saveCustomBang() {
      const bang = document.getElementById('custom-bang').value.trim();
      const url = document.getElementById('custom-url').value.trim();
      if (bang && url.includes('%s')) {
        bangs[bang] = url;
        localStorage.setItem(`bang:${bang}`, url);
        alert(`Added ${bang} → ${url}`);
      } else {
        alert('Invalid !bang or URL. Format: !mytag https://site.com/?q=%s');
      }
    }

    // Toggle dark mode
    document.getElementById('dark-mode').addEventListener('change', (e) => {
      localStorage.setItem('dark-mode', e.target.checked);
      document.body.style.backgroundColor = e.target.checked ? '#202124' : '#f8f9fa';
      document.body.style.color = e.target.checked ? '#e8eaed' : '#000';
    });

    // Search function (with tracker stripping)
    function search() {
      let query = document.getElementById('search').value.trim();
      if (!query) return;

      // Strip trackers if enabled
      if (document.getElementById('strip-trackers').checked) {
        query = query.replace(/(\?|&)(utm_\w+|fbclid|gclid)=[^&]+/g, '$1');
      }

      const bangMatch = query.match(/^(!\w+)\s?(.*)?/);
      if (bangMatch) {
        const [full, bang, rest = ''] = bangMatch;
        if (bangs[bang]) {
          window.location.href = bangs[bang].replace('%s', encodeURIComponent(rest));
          return;
        }
      }
      // Default to Google
      window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
    }

    // "I'm Feeling Lucky"
    function imFeelingLucky() {
      const query = document.getElementById('search').value.trim();
      if (!query) return;
      window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}&btnI=I%27m+Feeling+Lucky`;
    }

    // Enter key support
    document.getElementById('search').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') search();
    });

    // Initialize
    loadSettings();
  </script>
<script>
  if (window.location.search.includes('q=')) {
  // search logic
} else {
  // Register as a search engine
  window.addEventListener('DOMContentLoaded', () => {
    if (window.external && 'AddSearchProvider' in window.external) {
      window.external.AddSearchProvider('https://catsmoker.github.io/web/search.xml');
    }
  });
}
</script>
</body>
</html>
