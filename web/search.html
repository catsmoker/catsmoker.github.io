<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search V2 - CATSMOKER</title>
    <link rel="search" type="application/opensearchdescription+xml" href="search.xml" title="Search V2"> <!-- Relative path -->
    
    <link rel="icon" href="assets/ico/favicon.ico" type="image/x-icon">
    
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"></noscript>
    
    <!-- Global Base Styles -->
    <link rel="stylesheet" href="assets/css/home.css"> 
    <!-- Page Specific Styles -->
    <link rel="stylesheet" href="assets/css/search.css">
    <!-- Cursor Styles -->
    <link rel="stylesheet" href="assets/css/cursor.css">
    
    <script src="https://kit.fontawesome.com/2538377e9f.js" crossorigin="anonymous" defer></script>
</head>
<body>
    <!-- Custom cursor elements -->
    <div class="cursor-dot"></div>
    <div class="cursor-dot-outline"></div>

    <!-- Back Button -->
    <header class="page-header-nav search-header">
        <a href="home.html" class="back-button-page" aria-label="Go back to main page">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
         <button id="theme-toggle-btn" class="theme-toggle-button" aria-label="Toggle Theme">
            <i class="fas fa-moon"></i> <!-- Initial icon -->
        </button>
    </header>

    <div class="search-page-container">
        <div class="logo">
            <!-- Using an SVG for scalability and potential theming -->
            <svg class="search-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 34">
                <text x="0" y="28" font-family="Poppins, sans-serif" font-size="30" font-weight="600">
                    <tspan fill="#4285F4">S</tspan>
                    <tspan fill="#EA4335">e</tspan>
                    <tspan fill="#FBBC05">a</tspan>
                    <tspan fill="#4285F4">r</tspan>
                    <tspan fill="#34A853">c</tspan>
                    <tspan fill="#EA4335">h</tspan>
                </text>
            </svg>
        </div>
        <div class="subtext">V2 Enhanced by catsmoker</div>
        
        <div class="search-container">
            <div class="search-input-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-box" id="search" placeholder="Search or use !bang (e.g., !yt cats)" autofocus>
                <i class="fas fa-microphone voice-icon" title="Voice search (not implemented)"></i> <!-- Placeholder -->
            </div>
            
            <div class="buttons">
                <button class="search-btn" onclick="performSearch()">Search</button>
                <button class="lucky-btn" onclick="imFeelingLucky()">I'm Feeling Lucky</button>
                <button class="settings-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i> Settings</button>
            </div>
            
            <!-- Settings Panel -->
            <div id="settings-panel" class="settings-panel-card" style="display: none;">
                <h3><i class="fas fa-wrench"></i> Settings</h3>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="dark-mode"> Dark Mode
                    </label>
                </div>
                 <div class="setting-item">
                     <label>
                         <input type="checkbox" id="strip-trackers"> Remove tracking parameters (utm_, etc.)
                     </label>
                 </div>
                <div class="setting-item custom-bangs">
                    <h4><i class="fas fa-bolt"></i> Custom !bangs</h4>
                    <div class="bang-inputs">
                        <input type="text" id="custom-bang" placeholder="!mybang">
                        <input type="text" id="custom-url" placeholder="https://example.com/?q=%s">
                    </div>
                    <button class="add-bang-btn" onclick="saveCustomBang()">Add Bang</button>
                    <div id="custom-bang-list">
                        <!-- Custom bangs will be listed here by JS -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Ad Section -->
        <div class="ad-section search-ad">
            <p class="ad-message">Ads help keep tools like this free.</p>
            <div class="ad-container">
                 <script type="text/javascript">
                    atOptions = { /* Your Adsterra ad options */ };
                </script>
                <script type="text/javascript" src="//www.highperformanceformat.com/63fa2911679096f507a57fc2ae1aa25b/invoke.js"></script>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="global-footer-enhanced">
        <p>© 2024-2025 CATSMOKER. All rights reserved.</p>
        <!-- Removed viewers count from search page -->
    </footer>

    <script src="assets/js/search.js" defer></script>
    <script src="assets/js/cursor.js" defer></script>
</body>
</html>
