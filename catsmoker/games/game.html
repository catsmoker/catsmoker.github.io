<!DOCTYPE html>
<html>

<head>
    <title>Game Selector</title>
    <link rel="stylesheet" href="game.css">
</head>

<body>
    <h1>Game Selector</h1>
    <div class="game-container">
        <!-- Snake Game Button -->
        <div class="game-option">
            <h2>Snake Game</h2>
            <p>Play the classic Snake game!</p>
            <button onclick="startGame('snake')">Play</button>
        </div>
        <!-- Add more game options as needed -->
        <div class="game-container">
            <!-- coming soon Button -->
            <div class="game-option">
                <h2>coming soon</h2>
                <p>coming soon!</p>
                <button onclick="startGame('coming soon')">Play</button>
            </div>
    </div>

    <script>
        // Function to start the selected game
        function startGame(game) {
            if (game === 'snake') {
                // Redirect to the Snake game page
                window.location.href = 'snake/snake.html';
            } else if (game === 'coming soon') {
                // Redirect to the coming soon game page
                window.location.href = 'comingsoon.html';
            }
            // Add more conditions for other games as needed
        }
    </script>
</body>

</html>
